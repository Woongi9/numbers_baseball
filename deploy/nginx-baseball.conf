# Nginx 리버스 프록시 — 443(HTTPS) → localhost:8080(Spring Boot)
# 배치: /etc/nginx/sites-available/baseball  → sites-enabled 로 심볼릭 링크
#   sudo cp deploy/nginx-baseball.conf /etc/nginx/sites-available/baseball
#   sudo ln -sf /etc/nginx/sites-available/baseball /etc/nginx/sites-enabled/baseball
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS 인증서는 certbot(Let's Encrypt)로 발급. <도메인>은 DuckDNS 서브도메인으로 교체.
#   sudo certbot --nginx -d <도메인>.duckdns.org
# certbot 이 아래 ssl_certificate 경로를 자동으로 채워준다(수동 작성 불필요).
#
# ⚠️ 이 파일은 최초(DuckDNS) 배포 당시 템플릿이다. 현재 운영 도메인은 numbers-baseball.com
# (Cloudflare)으로 바뀌었지만 서버의 실제 nginx 설정은 여기 다시 반영되어 있지 않다.
# 아래 dev 블록의 인증서 발급 방식(certbot vs Cloudflare Origin CA 등)은 서버에 실제로
# 적용하기 전에 numbers-baseball.com 블록이 지금 어떤 방식을 쓰는지 먼저 확인하고 맞출 것.

server {
    listen 80;
    server_name CHANGE-ME.duckdns.org;
    # HTTP 로 들어오면 HTTPS 로 강제 이동(카카오는 HTTPS 필수)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name CHANGE-ME.duckdns.org;

    # certbot 이 채우는 인증서 경로(예시). certbot --nginx 사용 시 자동 설정됨.
    ssl_certificate     /etc/letsencrypt/live/CHANGE-ME.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/CHANGE-ME.duckdns.org/privkey.pem;

    # 카카오 스킬 서버 본문
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 카카오 5초 타임아웃과 정합: 업스트림 대기를 5초로 제한.
        proxy_read_timeout 5s;
    }

    # 헬스체크는 외부에 노출할 필요 없음 → localhost 외 차단(선택)
    location /actuator/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8080;
    }
}

# --- STEP 13-B: dev 인스턴스(9090) ---------------------------------------
# 같은 EC2 위에서 prod와 나란히 뜨는 dev(baseball-dev.service, 포트 9090)를
# dev.numbers-baseball.com 으로 노출한다. Cloudflare DNS에 이 서브도메인의
# A/CNAME 레코드가 먼저 추가돼 있어야 한다.
server {
    listen 80;
    server_name dev.numbers-baseball.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dev.numbers-baseball.com;

    # prod(numbers-baseball.com) 블록이 실제로 쓰는 인증서 발급 방식과 동일하게 맞출 것
    # (Cloudflare Origin CA 인증서라면 origin cert 경로로, certbot이면 도메인 추가 발급).
    ssl_certificate     /etc/letsencrypt/live/dev.numbers-baseball.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.numbers-baseball.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:9090;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
    }

    location /actuator/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:9090;
    }
}

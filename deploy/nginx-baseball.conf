# Nginx 리버스 프록시 — 실제 운영 서버(EC2) 구성 반영본.
#
# 구성: [Cloudflare(TLS 종단) → EC2:443(nginx) → localhost:8080(prod) / :9090(dev)]
#   - TLS는 Cloudflare 엣지가 종단하고, Cloudflare→origin(EC2)은 아래 origin 인증서로 연결된다.
#     (Let's Encrypt/DuckDNS 아님 — 인증서는 /etc/nginx/ssl/numbers-baseball.{pem,key})
#   - Host 헤더로 서버 블록을 고른다. 매칭이 없으면 첫 443 블록이 default 가 되므로,
#     dev 서브도메인은 반드시 자기 server_name 블록을 가져야 prod(8080)로 새지 않는다.
#
# 이 파일은 prod+dev 전체 목표 상태를 담은 "참고본"이다. 실제 운영 서버에서는 prod 설정을
# 건드리지 않도록 아래 dev 두 블록만 별도 파일로 떼어 배치하는 걸 권장한다(DEPLOY_RUNBOOK 10-⑤):
#   - prod: /etc/nginx/sites-available/numbers-baseball      (이미 배치돼 있음)
#   - dev : /etc/nginx/sites-available/dev-numbers-baseball  (dev 블록만)
#   sudo ln -sf .../dev-numbers-baseball /etc/nginx/sites-enabled/ && sudo nginx -t && sudo systemctl reload nginx
#
# ⚠️ dev 를 붙일 때 필수: dev jar(application-dev.yml)에 server.forward-headers-strategy=framework
#    가 있어야 nginx 가 넘기는 X-Forwarded-Proto(https)를 Spring 이 신뢰해, Swagger 서버 URL 이
#    https 로 생성된다(안 그러면 https 페이지에서 http 요청 → 브라우저 mixed-content 차단).

# --- prod: numbers-baseball.com → 8080 -----------------------------------
server {
    listen 80;
    server_name numbers-baseball.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name numbers-baseball.com;

    ssl_certificate     /etc/nginx/ssl/numbers-baseball.pem;
    ssl_certificate_key /etc/nginx/ssl/numbers-baseball.key;

    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- dev: dev.numbers-baseball.com → 9090 (STEP 13-B) --------------------
# prod 와 같은 인증서를 재사용한다(Cloudflare Full 모드라 origin 인증서 호스트명 검증 안 함).
# 운영 서버에서는 이 두 블록을 별도 파일(/etc/nginx/sites-available/dev-numbers-baseball)로
# 두면 prod 설정을 건드리지 않고 dev 만 켜고/끌 수 있다.
server {
    listen 80;
    server_name dev.numbers-baseball.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dev.numbers-baseball.com;

    ssl_certificate     /etc/nginx/ssl/numbers-baseball.pem;
    ssl_certificate_key /etc/nginx/ssl/numbers-baseball.key;

    location / {
        proxy_pass http://localhost:9090;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

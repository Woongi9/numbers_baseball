name: Deploy Dev

# develop 에 push 되면 자동 배포. 같은 EC2 위에서 prod(8080)와 별개로 dev(9090)를 다룬다.
# STEP 13-B: main→prod 배포(deploy.yml)는 건드리지 않고 완전히 분리된 워크플로로 둔다.
on:
  push:
    branches: [ develop ]
  workflow_dispatch:

# prod와 별도 concurrency 그룹 — 두 워크플로가 서로 취소하지 않는다.
concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # 품질 게이트는 prod와 동일. dev 프로파일로 빌드하면 bootJar 이름이
      # baseball-dev.jar로 분기된다(build.gradle.kts).
      - name: Test & Build (dev)
        run: |
          chmod +x gradlew
          ./gradlew clean test bootJar -Pprofile=dev

      # 1) 배포 스크립트 업로드 (dev 전용 start-dev.sh/stop-dev.sh)
      - name: Upload deploy scripts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: deploy/scripts/*.sh
          target: /home/ubuntu/scripts
          strip_components: 2

      # 2) 새 JAR 업로드 (스테이징 경로) — 파일명이 baseball-dev.jar라 prod 산출물과 섞이지 않는다.
      - name: Upload JAR to EC2 (staging)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: build/libs/baseball-dev.jar
          target: /home/ubuntu/deploy/
          strip_components: 2

      # 3) stop-dev -> start-dev (헬스체크/롤백은 start-dev.sh 내부)
      - name: Run deploy scripts (stop-dev -> start-dev)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            chmod +x /home/ubuntu/scripts/*.sh
            /home/ubuntu/scripts/stop-dev.sh
            sleep 5
            /home/ubuntu/scripts/start-dev.sh

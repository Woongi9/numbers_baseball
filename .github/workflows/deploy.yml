name: Deploy

# main 에 push 되면 자동 배포. 콘솔에서 수동 실행도 허용.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 동시에 여러 배포가 겹쳐 서버를 망가뜨리지 않도록 직렬화(앞 배포 진행 중이면 취소).
concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle            # 의존성 캐시로 빌드 단축

      # 품질 게이트: 테스트는 H2 인메모리라 외부 DB 없이 러너 단독 통과.
      # 테스트 실패 시 여기서 멈춰 깨진 코드가 배포되지 않는다.
      # JAR 은 JVM 바이트코드 → ubuntu-latest(x86)에서 빌드해도 EC2(ARM)에서 그대로 실행.
      - name: Test & Build (prod)
        run: |
          chmod +x gradlew
          ./gradlew clean test bootJar -Pprofile=prod

      # 1) 배포 스크립트 업로드 (stop.sh / start.sh) — 익숙한 GCP 흐름과 동일
      - name: Upload deploy scripts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: deploy/scripts/*.sh
          target: /home/ubuntu/scripts   # 스크립트 보관 경로
          strip_components: 2            # deploy/scripts 제거 → *.sh 만 업로드

      # 2) 새 JAR 업로드 (스테이징 경로)
      - name: Upload JAR to EC2 (staging)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: build/libs/baseball.jar
          target: /home/ubuntu/deploy/    # 스테이징 경로
          strip_components: 2             # build/libs 제거 → baseball.jar 만 업로드

      # 3) 배포 스크립트 실행 (stop -> start). 헬스체크/롤백은 start.sh 내부에서 수행.
      - name: Run deploy scripts (stop -> start)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            chmod +x /home/ubuntu/scripts/*.sh
            /home/ubuntu/scripts/stop.sh
            sleep 5
            /home/ubuntu/scripts/start.sh   # 실패(헬스체크 NG) 시 비정상 종료 → 잡 실패로 표시

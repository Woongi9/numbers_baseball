# dev(스테이징) 프로파일 — 같은 EC2에서 prod(8080)와 나란히 떠 있는 별도 인스턴스(9090).
# 활성화: 서버 systemd(baseball-dev.service)에서 SPRING_PROFILES_ACTIVE=dev 로 지정.
# application-prod.yml과 동일한 구조를 따른다: 이 파일은 레포에 커밋되지만 비밀은 담지 않고,
# 서버의 /home/ubuntu/baseball-dev.env(systemd EnvironmentFile)로만 주입한다.
server:
  port: 9090
  # Nginx가 dev를 HTTPS(443)로 받아 평문 HTTP(9090)로 프록시하기 때문에, 이 설정이 없으면
  # Spring이 자기 자신을 계속 http로 인식한다. Nginx가 이미 보내는 X-Forwarded-Proto/Host를
  # 신뢰해야 springdoc이 Swagger의 서버 주소를 https로 정확히 인식한다(mixed-content 방지).
  forward-headers-strategy: framework

logging:
  file:
    name: /home/ubuntu/logs/server-dev.log   # prod(server.log)와 파일을 분리해 로그가 섞이지 않게 한다

# BasicCard 썸네일 베이스 URL. dev 서브도메인으로 고정.
kakao:
  image-base-url: ${KAKAO_IMAGE_BASE_URL:https://dev.numbers-baseball.com/images}
  mention-button-label: "@숫자야구 봇 테스트"

spring:
  application:
    name: 개발-숫자야구

  datasource:
    # 같은 RDS 인스턴스, 스키마만 baseball_dev로 분리(STEP 13-B). 비밀은 baseball-dev.env로 주입.
    url: ${DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5           # dev는 트래픽이 없다시피 하므로 prod보다 보수적으로 작게
      connection-timeout: 4500

  jpa:
    hibernate:
      ddl-auto: update               # dev는 스키마 변경을 자유롭게 허용(prod는 validate 고정)
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# 헬스체크는 prod와 동일한 이유(배포 스크립트의 자동 롤백 판단)로 노출.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  health:
    db:
      enabled: true

# dev는 Swagger를 켜둬도 무방(외부에서 실제 카카오 검증 외엔 접근자가 적음)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

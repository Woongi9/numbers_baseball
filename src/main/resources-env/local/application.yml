server:
  port: 8080

logging:
  file:
    name: /home/ubuntu/logs/server.log

spring:
  profiles:
    active: local
  application:
    name: numbers-baseball

  # 로컬 MySQL (docker-compose.yml로 기동). 운영 RDS와 같은 8.0 + utf8mb4로 통일.
  datasource:
    url: jdbc:mysql://localhost:3306/baseball?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: baseball
    password: baseball

  # 개발 중 스키마 자동 생성/갱신
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# Swagger UI: http://localhost:8080/swagger-ui.html
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method   # 메서드(GET/POST 등) 순 정렬
